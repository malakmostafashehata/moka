 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malak's 20th Birthday</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div class="envelope-wrapper">
    <div id="envelope" class="close">
        <div class="front flap"></div>
        <div class="front pocket"></div>
        
        <div class="words">TAP TO OPEN</div>
        
        <div class="letter">
            <img src="moka.png" class="main-invite" alt="Birthday Invitation">
        </div>
    </div>
</div>
    <script>
        const envelope = document.getElementById('envelope');
        envelope.addEventListener('click', () => {
            if (envelope.classList.contains('close')) {
                confetti({
                    particleCount: 150,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#ffffff', '#f69db9', '#ffc5de']
                });
            }
            envelope.classList.toggle('open');
            envelope.classList.toggle('close');
        });
    </script>
</body>
</html>
